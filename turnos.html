<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoJo's Barber</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #1a1a1a; color: #EDE8D0; font-family: sans-serif; text-align: center; padding-bottom: 80px; }
        h1 { font-family: 'Permanent Marker', cursive; font-size: 40px; color: #06402B; text-shadow: 2px 2px 0 #fff; margin: 20px 0; }
        .cartel { background: #fff; color: #06402B; padding: 5px 15px; font-family: 'Permanent Marker', cursive; display: inline-block; margin-bottom: 20px; }
        .contenedor { max-width: 450px; margin: auto; padding: 0 15px; }
        .dia-header { font-family: 'Permanent Marker', cursive; font-size: 24px; color: #fff; text-align: left; margin: 25px 0 10px; border-bottom: 3px solid #06402B; }
        .turno { background: #262626; border: 2px solid #fff; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 4px 4px 0px #06402B; }
        .hora { font-size: 20px; font-family: 'Permanent Marker', cursive; }
        .btn-res { font-family: 'Permanent Marker', cursive; background: #06402B; color: #fff; border: 1px solid #fff; padding: 10px; cursor: pointer; }
        #abrir-chat { position: fixed; bottom: 20px; left: 20px; background: #06402B; color: #fff; border: 2px solid #fff; padding: 15px; font-family: 'Permanent Marker', cursive; z-index: 999; }
        #chatbot { position: fixed; bottom: 20px; left: 20px; width: 280px; background: #262626; border: 4px solid #06402B; display: none; flex-direction: column; z-index: 1000; text-align: left; }
        .chat-head { background: #06402B; color: #fff; padding: 10px; font-family: 'Permanent Marker', cursive; display: flex; justify-content: space-between; }
        #chat-msj { height: 150px; padding: 10px; font-size: 13px; overflow-y: auto; background: #000; color: #0f0; }
        .chat-in { display: flex; border-top: 2px solid #fff; }
        #user-input { flex: 1; padding: 10px; border: none; background: #222; color: #fff; outline: none; }
        #btn-enviar { background: #fff; color: #06402B; border: none; padding: 0 15px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>JOJO'S BARBER</h1>
    <div class="cartel">LUNES A SÁBADO | 16:00 - 20:00 | $8.000</div>
    <div class="contenedor" id="lista-turnos"></div>
    <div id="abrir-chat" onclick="toggleChat(true)">IA CHAT ✍️</div>
    <div id="chatbot">
        <div class="chat-head"><span>BARBER IA ✂️</span><span style="color:red;cursor:pointer" onclick="toggleChat(false)">✖</span></div>
        <div id="chat-msj"><div><b>IA:</b> ¡Buenas! Cortes modernos por $8.000. ¿Qué buscás?</div></div>
        <div class="chat-in"><input type="text" id="user-input" placeholder="Preguntame..."><button id="btn-enviar" onclick="enviarMensaje()">➔</button></div>
    </div>

<script>
    const dias = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
    const horas = ["16:00", "17:00", "18:00", "19:00", "20:00"];
    const lista = document.getElementById('lista-turnos');

    dias.forEach(d => {
        let h = document.createElement('div'); h.className = 'dia-header'; h.innerText = d.toUpperCase();
        lista.appendChild(h);
        horas.forEach(hr => {
            let t = document.createElement('div'); t.className = 'turno';
            t.innerHTML = `<span class="hora">${hr}</span><button class="btn-res" onclick="abrirYReservar('${d}','${hr}')">RESERVAR</button>`;
            lista.appendChild(t);
        });
    });

    function toggleChat(m) {
        document.getElementById('chatbot').style.display = m ? 'flex' : 'none';
        document.getElementById('abrir-chat').style.display = m ? 'none' : 'block';
    }

    function abrirYReservar(d, h) {
        toggleChat(true);
        enviarMensaje(`¿Tenés lugar el ${d} a las ${h}?`);
    }

    function enviarMensaje(t) {
        const i = document.getElementById('user-input');
        const c = document.getElementById('chat-msj');
        let m = t || i.value; if(!m) return;
        c.innerHTML += `<div style="margin-top:10px; color:#fff;"><b>Vos:</b> ${m}</div>`;
        i.value = ""; c.scrollTop = c.scrollHeight;
        setTimeout(() => {
            let r = "¡De una! Te esperamos. El corte sale $8.000 y hacemos puros estilos modernos.";
            if(m.toLowerCase().includes("precio")) r = "El corte está $8.000 pesos, crack.";
            c.innerHTML += `<div style="margin-top:10px;"><b>IA:</b> ${r}</div>`;
            c.scrollTop = c.scrollHeight;
        }, 600);
    }
</script>
</body>
</html>
